app = "phonetap-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  DATA_DIR = "/persistent/data"
  UPLOAD_DIR = "/persistent/uploads"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "phonetap_persistent"
  destination = "/persistent"
  processes = ["app"]
